{% extends 'base.html' %}
{% block header_title %}Edit Contribution{% endblock %}
{% block content %}
<div class="max-w-2xl bg-white p-8 rounded-xl shadow-sm border border-gray-100">
    <h3 class="mb-4 text-lg font-bold">সম্পাদনা for {{ contrib.member.full_name }} ({{ contrib.month }}/{{ contrib.year }})</h3>
    <form method="POST" action="{{ url_for('contrib_edit', id=contrib.id) }}" class="space-y-6">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Expected পরিমাণ ($)</label>
            <input type="number" step="0.01" name="expected_amount" value="{{ contrib.expected_amount }}" required class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-primary">
        </div>
        <div class="flex justify-end pt-4">
            <button type="submit" class="bg-primary text-white px-6 py-2 rounded-lg font-medium hover:bg-blue-700">সংরক্ষণ করুন Changes</button>
        </div>
    </form>
</div>
{% endblock %}
