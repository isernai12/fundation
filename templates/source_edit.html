{% extends "base.html" %}

{% block header_title %}Edit Fund Source{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-lg border border-slate-200 shadow-sm overflow-hidden">
    <div class="px-6 py-4 border-b border-slate-200 bg-slate-50">
        <h3 class="text-base font-semibold text-slate-800">সম্পাদনা Source: {{ source.name }}</h3>
    </div>
    <form action="{{ url_for('source_edit', id=source.id) }}" method="POST" class="p-6 space-y-6">
        
        <div class="grid grid-cols-1 gap-6">
            <div>
                <label for="name" class="block text-sm font-medium text-slate-700 mb-1">Source নাম *</label>
                <input type="text" name="name" id="name" value="{{ source.name }}" required class="block w-full border border-slate-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-slate-700 mb-1">Description</label>
                <textarea id="description" name="description" rows="3" class="block w-full border border-slate-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">{{ source.description or '' }}</textarea>
            </div>
        </div>

        <div class="pt-4 border-t border-slate-200 flex justify-end">
            <a href="{{ url_for('source_manage') }}" class="bg-white border border-slate-300 rounded-md shadow-sm py-2 px-4 inline-flex justify-center text-sm font-medium text-slate-700 hover:bg-slate-50 focus:outline-none mr-3">
                বাতিল
            </a>
            <button type="submit" class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none">
                Update Source
            </button>
        </div>
    </form>
</div>
{% endblock %}
