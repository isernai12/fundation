{% extends 'base.html' %}
{% block header_title %}Error{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto mt-10 bg-white p-8 rounded-xl shadow-sm border border-red-100 text-center">
    <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
        <i data-lucide="alert-triangle" class="w-8 h-8"></i>
    </div>
    <h2 class="text-2xl font-bold text-gray-800 mb-2">Something went wrong.</h2>
    <p class="text-gray-600 mb-6">{{ message }}</p>
    <a href="{{ url_for('dashboard') }}" class="bg-primary text-white px-6 py-2 rounded-lg font-medium hover:bg-blue-700 transition-colors inline-block">Return to ড্যাশবোর্ড</a>
</div>
{% endblock %}
