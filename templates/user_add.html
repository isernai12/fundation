{% extends "base.html" %}

{% block header_title %}Add New User{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-lg border border-slate-200 shadow-sm overflow-hidden">
    <div class="px-6 py-4 border-b border-slate-200 bg-slate-50">
        <h3 class="text-base font-semibold text-slate-800">User Details Form</h3>
    </div>
    <form action="{{ url_for('user_add') }}" method="POST" class="p-6 space-y-6">
        
        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
            <div class="sm:col-span-2">
                <label for="name" class="block text-sm font-medium text-slate-700 mb-1">পূর্ণ নাম *</label>
                <input type="text" name="name" id="name" required class="block w-full border border-slate-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-slate-700 mb-1">ইমেইল ঠিকানা *</label>
                <input type="email" name="email" id="email" required class="block w-full border border-slate-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
            </div>

            <div>
                <label for="phone" class="block text-sm font-medium text-slate-700 mb-1">মোবাইল নম্বর</label>
                <input type="text" name="phone" id="phone" class="block w-full border border-slate-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
            </div>

            <div class="sm:col-span-2">
                <label for="status" class="block text-sm font-medium text-slate-700 mb-1">অবস্থা</label>
                <select id="status" name="status" class="block w-full border border-slate-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm bg-white">
                    <option value="সক্রিয়">সক্রিয়</option>
                    <option value="নিষ্ক্রিয়">নিষ্ক্রিয়</option>
                </select>
            </div>
        </div>

        <div class="pt-4 border-t border-slate-200 flex justify-end">
            <a href="{{ url_for('members') }}" class="bg-white border border-slate-300 rounded-md shadow-sm py-2 px-4 inline-flex justify-center text-sm font-medium text-slate-700 hover:bg-slate-50 focus:outline-none mr-3">
                বাতিল
            </a>
            <button type="submit" class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none">
                সংরক্ষণ করুন User
            </button>
        </div>
    </form>
</div>
{% endblock %}
