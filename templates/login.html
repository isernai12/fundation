<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Foundation Manager</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
    <div class="login-box">
        <div class="login-logo">
            <i class="fa-solid fa-building-columns text-primary"></i> Foundation OS
        </div>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger" role="alert">
                <i class="fa-solid fa-circle-exclamation me-2"></i> {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label for="username" class="form-label text-muted small fw-semibold">Username</label>
                <input type="text" id="username" name="username" class="form-control" required autocomplete="off" placeholder="Enter your username">
            </div>
            <div class="mb-4">
                <label for="password" class="form-label text-muted small fw-semibold">Password</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-semibold">
                <i class="fa-solid fa-right-to-bracket me-2"></i> Login
            </button>
        </form>
        
        <div class="text-center mt-4 pt-3 border-top">
            <p class="text-muted small mb-0">Default access: <strong>admin</strong> / <strong>admin123</strong></p>
        </div>
    </div>
</body>
</html>
