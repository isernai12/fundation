{% extends 'base.html' %}
{% block header_title %}Assistance Report{% endblock %}
{% block content %}
<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <table class="w-full text-left border-collapse">
        <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-xs font-semibold text-gray-500 uppercase">Date</th>
                <th class="px-6 py-3 text-xs font-semibold text-gray-500 uppercase">Beneficiary</th>
                <th class="px-6 py-3 text-xs font-semibold text-gray-500 uppercase">পরিমাণ</th>
                <th class="px-6 py-3 text-xs font-semibold text-gray-500 uppercase">অবস্থা</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
            {% for r in requests %}
            <tr class="hover:bg-gray-50">
                <td class="px-6 py-4 text-sm text-gray-600">{{ r.date.strftime('%Y-%m-%d') }}</td>
                <td class="px-6 py-4 text-sm font-medium text-gray-900">{{ r.beneficiary.name }}</td>
                <td class="px-6 py-4 text-sm text-green-600 font-bold">${{ "%.2f"|format(r.amount) }}</td>
                <td class="px-6 py-4 text-sm"><span class="px-2 py-1 bg-green-100 text-green-700 rounded-full text-xs font-medium">{{ r.status }}</span></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
