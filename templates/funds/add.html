{% extends "base.html" %}

{% block header_title %}Add New Fund{% endblock %}

{% block content %}
<div class="glass" style="padding: 2rem; max-width: 600px;">
    <form method="POST" action="{{ url_for('funds_add') }}">
        <div class="form-group">
            <label for="name">Fund Name / Source</label>
            <input type="text" id="name" name="name" class="form-control" required placeholder="e.g., Annual Gala Donation">
        </div>
        <div class="form-group">
            <label for="amount">Initial Amount ($)</label>
            <input type="number" step="0.01" id="amount" name="amount" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" class="form-control" rows="4" style="resize: vertical;"></textarea>
        </div>
        <button type="submit" class="btn" style="margin-top: 1rem;">Record Fund</button>
    </form>
</div>
{% endblock %}
