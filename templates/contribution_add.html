{% extends 'base.html' %}
{% block header_title %}Add Manual Contribution{% endblock %}
{% block content %}
<div class="max-w-2xl bg-white p-8 rounded-xl shadow-sm border border-gray-100">
    <form method="POST" action="{{ url_for('contrib_add') }}" class="space-y-6">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Member</label>
            <select name="member_id" required class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-primary">
                {% for u in members %}
                <option value="{{ m.id }}">{{ m.full_name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Month (1-12)</label>
                <input type="number" min="1" max="12" name="month" required class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-primary">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Year</label>
                <input type="number" name="year" required value="2026" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-primary">
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Expected পরিমাণ ($)</label>
            <input type="number" step="0.01" name="expected_amount" required class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-primary">
        </div>
        <div class="flex justify-end pt-4">
            <button type="submit" class="bg-primary text-white px-6 py-2 rounded-lg font-medium hover:bg-blue-700">Add Contribution</button>
        </div>
    </form>
</div>
{% endblock %}
