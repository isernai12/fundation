{% extends 'base.html' %}
{% block header_title %}Issue Loan{% endblock %}
{% block content %}
<div class="max-w-2xl bg-white p-8 rounded-xl shadow-sm border border-gray-100">
    <form method="POST" action="{{ url_for('issue_loan') }}" class="space-y-6">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">ঋণ Beneficiary</label>
            <select name="beneficiary_id" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none">
                <option value="">-- Select Beneficiary --</option>
                {% for b in beneficiaries %}
                <option value="{{ b.id }}">{{ b.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">ঋণ পরিমাণ ($)</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <span class="text-gray-500">$</span>
                </div>
                <input type="number" step="0.01" name="amount" required class="w-full pl-8 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none">
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Start Date</label>
            <input type="date" name="start_date" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Duration (Months)</label>
            <select name="duration_months" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none">
                {% for i in range(1, 7) %}
                <option value="{{ i }}">{{ i }} Month{% if i>1 %}s{% endif %}</option>
                {% endfor %}
            </select>
        </div>
        <div class="bg-blue-50 p-4 rounded-lg border border-blue-100 mb-4">
            <p class="text-sm text-blue-800">The monthly installment is automatically calculated based on the loan amount and duration.</p>
        </div>
        <div class="flex justify-end pt-4">
            <button type="submit" class="bg-primary text-white px-6 py-2 rounded-lg font-medium hover:bg-blue-700 transition-colors shadow-sm">Issue ঋণ & Generate Schedule</button>
        </div>
    </form>
</div>
{% endblock %}
