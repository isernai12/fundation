{% extends 'base.html' %}
{% block header_title %}Contribution Settings{% endblock %}
{% block content %}
<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <table class="w-full text-left border-collapse">
        <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-xs font-semibold text-gray-500 uppercase">Member নাম</th>
                <th class="px-6 py-3 text-xs font-semibold text-gray-500 uppercase">Monthly পরিমাণ ($)</th>
                <th class="px-6 py-3 text-xs font-semibold text-gray-500 uppercase text-right">Update</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
            {% for m in members %}
            <tr class="hover:bg-gray-50">
                <td class="px-6 py-4 text-sm font-medium text-gray-900">{{ m.full_name }}</td>
                <form method="POST" action="{{ url_for('contrib_settings') }}">
                    <td class="px-6 py-4">
                        <input type="hidden" name="member_id" value="{{ m.id }}">
                        <input type="number" step="0.01" name="monthly_amount" value="{{ m.monthly_contribution_amount if m.monthly_contribution_amount else '' }}" class="w-32 px-3 py-1 border rounded outline-none focus:ring-2 focus:ring-primary">
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button type="submit" class="text-blue-600 hover:underline">সংরক্ষণ করুন</button>
                    </td>
                </form>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
