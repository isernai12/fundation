{% extends "base.html" %}

{% block header_title %}Add New User{% endblock %}

{% block content %}
<div class="glass" style="padding: 2rem; max-width: 600px;">
    <form method="POST" action="{{ url_for('users_add') }}">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="text" id="phone" name="phone" class="form-control">
        </div>
        <button type="submit" class="btn" style="margin-top: 1rem;">Register User</button>
    </form>
</div>
{% endblock %}
